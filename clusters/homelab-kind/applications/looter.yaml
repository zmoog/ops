apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: looter-homelab-kind
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zmoog/ops.git
    targetRevision: main
    path: apps/looter/chart
    helm:
      valueFiles:
        - values-homelab-kind.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
