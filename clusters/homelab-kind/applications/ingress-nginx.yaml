apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx-homelab-kind
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.3
    helm:
      values: |
        controller:
          kind: DaemonSet
          hostPort:
            enabled: true
          service:
            type: ClusterIP
          ingressClassResource:
            default: true
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
