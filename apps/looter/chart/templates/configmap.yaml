apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name | quote }}
data:
  collector.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:{{ .Values.service.healthPort }}
      pprof:
        endpoint: 0.0.0.0:{{ .Values.service.pprofPort }}
      zpages:
        endpoint: 0.0.0.0:{{ .Values.service.zpagesPort }}

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.service.otlpGrpcPort }}
          http:
            endpoint: 0.0.0.0:{{ .Values.service.otlpHttpPort }}

    processors:
      memory_limiter:
        check_interval: {{ .Values.collector.memoryLimiter.checkInterval }}
        limit_mib: {{ .Values.collector.memoryLimiter.limitMiB }}
        spike_limit_mib: {{ .Values.collector.memoryLimiter.spikeLimitMiB }}
      batch:
        timeout: {{ .Values.collector.batch.timeout }}

    exporters:
      debug:
        verbosity: {{ .Values.collector.debugExporter.verbosity }}

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: {{ .Values.collector.telemetry.prometheus.host }}
                    port: {{ .Values.collector.telemetry.prometheus.port }}
