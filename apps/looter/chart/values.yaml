name: looter

image:
  repository: ghcr.io/zmoog/looter
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

secretName: looter-secrets

service:
  type: ClusterIP
  otlpGrpcPort: 4317
  otlpHttpPort: 4318
  healthPort: 13133
  pprofPort: 1777
  zpagesPort: 55679

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 768Mi

collector:
  memoryLimiter:
    checkInterval: 1s
    limitMiB: 512
    spikeLimitMiB: 128
  batch:
    timeout: 1s
  debugExporter:
    verbosity: normal
  telemetry:
    prometheus:
      host: 127.0.0.1
      port: 8889

discord:
  enabled: false
  botTokenEnvVar: DISCORD_BOT_TOKEN
  secretKey: DISCORD_BOT_TOKEN
  guildIds: []
  channelIds: []

# External Secrets Operator integration.
# When enabled, an ExternalSecret is created that pulls the Discord bot token
# from the configured ClusterSecretStore instead of requiring a manually
# applied k8s Secret.
externalSecret:
  enabled: false
  refreshInterval: 1h
  secretStore:
    name: azure-kv
    kind: ClusterSecretStore
  remoteRefs:
    discordBotToken: discord-bot-token
