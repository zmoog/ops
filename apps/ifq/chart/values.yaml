name: ifq-download

image:
  repository: ghcr.io/zmoog/ifq-job
  tag: latest
  pullPolicy: IfNotPresent

schedule: "0 5 * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 2
failedJobsHistoryLimit: 5
backoffLimit: 2

secretName: ifq-job-secrets

env:
  IFQ_RETRY_ATTEMPTS: "3"
  IFQ_RETRY_DELAY_SECONDS: "60"
  DROPBOX_KEEP_DAYS: "7"

otel:
  enabled: false
  serviceName: ifq-job
  resourceAttributes: ""
  exporter:
    endpoint: ""
    headers: ""

runOnceJob:
  enabled: false
  name: ifq-download-once
  backoffLimit: 1

# External Secrets Operator integration.
# When enabled, an ExternalSecret is created that pulls secret values
# from the configured ClusterSecretStore instead of requiring a
# manually applied k8s Secret.
externalSecret:
  enabled: false
  refreshInterval: 1h
  secretStore:
    name: azure-kv
    kind: ClusterSecretStore
