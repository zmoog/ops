apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name | quote }}
    spec:
      serviceAccountName: {{ .Values.name | quote }}
      containers:
        - name: otel-collector-gateway
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          args: ["--config=/conf/collector.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: {{ .Values.service.otlpGrpcPort }}
            - name: otlp-http
              containerPort: {{ .Values.service.otlpHttpPort }}
            - name: prom-metrics
              containerPort: {{ .Values.service.prometheusPort }}
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.name | quote }}
